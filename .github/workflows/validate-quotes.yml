name: Validate Quotes

on:
  pull_request:
    paths:
      - 'quotes.json'
      - 'data/*.json'
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate quotes
        run: node scripts/validate-quotes.js

      - name: Run tests
        run: npm test
