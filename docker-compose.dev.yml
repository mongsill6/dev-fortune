version: '3.8'

services:
  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:server
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  web:
    image: node:20-alpine
    working_dir: /app/web
    volumes:
      - ./web:/app/web
      - /app/web/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
