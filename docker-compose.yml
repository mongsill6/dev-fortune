version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000"
    restart: always
    environment:
      NODE_ENV: production

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "80"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
